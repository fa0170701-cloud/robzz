<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nanang❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
font-family:Segoe UI,sans-serif;
}

canvas{
position:fixed;
top:0;
left:0;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
width:90%;
}

.name{
font-size:70px;
font-weight:bold;
color:#ff5ca8;
opacity:0;
text-shadow:
0 0 10px #ff5ca8,
0 0 20px #ff5ca8,
0 0 40px #ff5ca8;
animation:fadeIn 3s forwards;
}

.message{
margin-top:20px;
font-size:28px;
color:white;
min-height:40px;
}

.love{
margin-top:25px;
font-size:22px;
color:#ffd6ea;
opacity:0;
animation:showLove 3s forwards;
animation-delay:5s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes showLove{
to{
opacity:1;
}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">

<div class="name">
Jahwa ajwa kirana ❤️
</div>

<div class="message" id="typing"></div>

<div class="love">
<br>
</div>

</div>

<script>

const text =
"";

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,100);
}
}

setTimeout(typeWriter,2500);

/* ===== LOVE PARTICLES ===== */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const particles=[];

function heart(t){
return{
x:16*Math.pow(Math.sin(t),3),
y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
};
}

for(let i=0;i<2200;i++){

const t=Math.random()*Math.PI*2;
const p=heart(t);

particles.push({
x:(Math.random()-0.5)*canvas.width,
y:(Math.random()-0.5)*canvas.height,
tx:p.x*15,
ty:p.y*15
});
}

let scale=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

scale=1+Math.sin(Date.now()*0.004)*0.08;

particles.forEach(p=>{

p.x+=(p.tx*scale-p.x)*0.03;
p.y+=(p.ty*scale-p.y)*0.03;

ctx.fillStyle="#ff4da6";
ctx.shadowColor="#ff4da6";
ctx.shadowBlur=12;

ctx.fillRect(
canvas.width/2+p.x,
canvas.height/2+180+p.y,
2,
2
);

});

requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize",()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
});

</script>

</body>
</html>
